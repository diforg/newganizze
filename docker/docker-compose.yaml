services:
  # Servidor Nginx
  webserver:
    build:
      context: ..
      dockerfile: docker/Dockerfile.nginx
    container_name: ngzz-nginx
    ports:
      - "8088:80"
    volumes:
      - ../src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app-network

  # Servidor PHP (Backend)
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.php
    container_name: ngzz-php_app
    working_dir: /var/www/html
    volumes:
      - ../src:/var/www/html
      - ./php/php.ini:/usr/local/etc/php/php.ini
    expose:
      - "9000"
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=myapp
      - DB_USERNAME=user
      - DB_PASSWORD=password
    depends_on:
      - mysql
    networks:
      - app-network

  # Banco de dados (MySQL)
  mysql:
    image: mysql:8.0
    container_name: ngzz-mysql_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: myapp
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - ngzz_mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "33066:3306"
    networks:
      - app-network

  # Servidor Vite (Frontend) - Desenvolvimento
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.vite
    container_name: ngzz-vite_frontend
    working_dir: /var/www/html
    volumes:
      - ../src:/var/www/html
      - /var/www/html/node_modules
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - app
    networks:
      - app-network

  # PHPMyAdmin (Opcional)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: ngzz-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  ngzz_mysql_data:
    driver: local